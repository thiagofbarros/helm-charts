# Basic application information
application:
  name: vaultwarden
  environment: dev
  type: deployment

### Deployment Configuration
deployment:
  replicaCount: 1
  
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80
  
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%

### Image Configuration
image:
  repository: vaultwarden/server
  pullPolicy: IfNotPresent
  tag: "1.33.2"

imagePullSecrets: []

### Environment Variables
env:
  - name: WEB_VAULT_ENABLED
    value: "true"
  - name: SIGNUPS_ALLOWED
    value: "false"
  - name: INVITATIONS_ALLOWED
    value: "false"
  # - name: ADMIN_TOKEN
  #   value: "change-me-in-production"

envFromConfigMaps: {}
  # - name: my-config-map

envFromSecrets: {}
  # - name: my-secret

externalSecrets:
  # secrets:
  #   - name: my-external-secret
  #     key: cluster/namespace/my-external-secret
  #     refreshInterval: 1h
  #     secretStore: vault-oke

configMaps: {}
  # my-config-map:
  #   data:
  #     my-key: my-value
  #   labels:
  #     app: my-app
  #   annotations:
  #     description: "This is my config map"

podAnnotations: {}
podLabels: {}

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /alive
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  
readinessProbe:
  httpGet:
    path: /alive
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

# Persistent Volume Claim configuration
persistence:
  enabled: true
  name: data
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /data
  # storageClass: standard

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

serviceAccount:
  create: true
  annotations: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

### Service Configuration
service:
  type: ClusterIP
  port: 80

### Ingress Configuration
ingress:
  enabled: false
  # className: ""
  # annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  # hosts:
  #   - host: vaultwarden.example.com
  #     paths:
  #       - path: /
  #         pathType: ImplementationSpecific
  # tls: []
  #  - secretName: vaultwarden-tls
  #    hosts:
  #      - vaultwarden.example.com

# -- Expose the service via gateway-api HTTPRoute
# Requires Gateway API resources and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)
httpRoute:
  # HTTPRoute enabled.
  enabled: false
  # HTTPRoute annotations.
  annotations: {}
  # Which Gateways this Route is attached to.
  parentRefs:
  - name: gateway
    sectionName: http
    # namespace: default
  # Hostnames matching HTTP header.
  hostnames:
  - vaultwarden.example.com
  # List of rules and filters applied.
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /